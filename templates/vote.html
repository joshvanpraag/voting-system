{% extends "base.html" %}
{% block title %}Vote — School Vote{% endblock %}
{% block body_class %}kiosk-screen bg-light{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">
  <div class="vote-container w-100" style="max-width: 820px;">

    <h1 class="kiosk-question text-center mb-5 text-dark">
      {{ voting_session.question }}
    </h1>

    <form method="POST" action="/submit-vote" id="vote-form">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="d-grid gap-3">
        {% for opt_key, opt_label in options %}
        <button type="submit" name="option" value="{{ opt_key }}"
                class="btn btn-vote btn-outline-primary">
          <span class="option-letter">{{ opt_key }}</span>
          <span class="option-label">{{ opt_label }}</span>
        </button>
        {% endfor %}
      </div>
    </form>

  </div>
</div>

<!-- Shown immediately after submission so the selected button state
     is never visible to the next user while the server processes. -->
<div id="submit-overlay" style="display:none;position:fixed;inset:0;background:white;z-index:9999;"></div>
{% endblock %}

{% block extra_scripts %}
<script>
  var form    = document.getElementById('vote-form');
  var overlay = document.getElementById('submit-overlay');

  form.addEventListener('submit', function(e) {
    var buttons   = this.querySelectorAll('button');
    var submitter = e.submitter;
    buttons.forEach(function(b) {
      if (b !== submitter) b.disabled = true;
      b.classList.remove('active');
    });
    if (submitter) {
      submitter.classList.add('active');
    }
    // Two rAF calls = two frames (~33 ms) of visible feedback for the voter,
    // then the overlay covers everything before the server responds.
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        overlay.style.display = 'block';
      });
    });
  });

  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      // If bfcache restored the page while the overlay was up, hide it.
      overlay.style.display = 'none';
      var buttons = form.querySelectorAll('button');
      // Suppress Bootstrap's transition so the reset is instant, not a visible fade.
      buttons.forEach(function(b) { b.style.transition = 'none'; });
      void form.offsetHeight;
      buttons.forEach(function(b) {
        b.disabled = false;
        b.classList.remove('active');
        b.blur();
      });
      void form.offsetHeight;
      buttons.forEach(function(b) { b.style.transition = ''; });
    }
  });
</script>
{% endblock %}
